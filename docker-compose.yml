version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financial-analyst-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - analyst-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financial-analyst-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - analyst-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  analyst-network:
    driver: bridge